<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLO🍀VER OS</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- STARTUP SCREEN -->
<div id="startup">

    <div class="computer">

        <h1>CLO🍀VER OS</h1>

        <p id="status">
            Starting Up...
        </p>


        <div class="loadingBar">

            <div id="progress"></div>

        </div>


        <p id="moonMessage"></p>


        <div class="mascot">
            🐱
        </div>


    </div>

</div>




<!-- DESKTOP -->

<div id="desktop">

    <div class="topbar">

        <span>
        🍀 CLOVER OS
        </span>


        <span id="clock">
        00:00
        </span>


    </div>



    <div class="icons">


        <div class="icon">
            📁
            <p>Crafts</p>
        </div>



        <div class="icon">
            ⭐
            <p>Sticker Shop</p>
        </div>



        <div class="icon">
            🐱
            <p>Mascot</p>
        </div>



        <div class="icon">
            🌙
            <p>OC Room</p>
        </div>



        <div class="icon">
            🎵
            <p>Music</p>
        </div>


    </div>


</div>



<script src="script.js"></script>


</body>
</html>
